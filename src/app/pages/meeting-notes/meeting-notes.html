<section class="max-w-3xl mx-auto">
  <div class="border p-4 mb-4">
    <h1 class="text-2xl font-bold mb-2">Meeting Notes</h1>

    <p>Add meeting notes</p>
  </div>

  <form class="border p-4" (ngSubmit)="addMeetingNote()">
    <h2 class="font-bold mb-3">Add Meeting</h2>

    <div class="mb-3">
      <label class="block mb-1"> Meeting Title </label>

      <input
        class="border w-full p-2"
        type="text"
        name="title"
        placeholder="Example: Youth leaders weekly check-in"
        [(ngModel)]="title"
      />
    </div>

    <div class="mb-3">
      <label class="block mb-1"> Meeting Notes </label>

      <textarea
        class="border w-full p-2 min-h-32"
        name="notes"
        placeholder="Write the main points, decisions, and action items..."
        [(ngModel)]="notes"
      ></textarea>
    </div>

    <button class="border px-4 py-2" type="submit">Save Meeting</button>
  </form>
</section>
